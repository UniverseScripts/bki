<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neonatal VAP Diagnostic Terminal</title>
    <!-- CSP enforcing no inline scripts -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; connect-src 'self' ws: wss:;">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="terminal-box">
    <div class="header-block">
        <h1>VAP Real-Time Monitoring Terminal</h1>
        <p>Operational Target: Cloud-Adjacent / Low-Cost Edge Validation Core</p>
    </div>

    <div class="grid-layout">
        <div class="parameter-cell">
            <label>PEEP (mbar)</label>
            <input type="number" id="param-peep" value="5.0" step="0.1">
        </div>
        <div class="parameter-cell">
            <label>PIP (mbar)</label>
            <input type="number" id="param-pip" value="18.5" step="0.5">
        </div>
        <div class="parameter-cell">
            <label>FiO2 (%)</label>
            <input type="number" id="param-fio2" value="45.0" step="1.0">
        </div>
        <div class="parameter-cell">
            <label>HRV Variance</label>
            <input type="number" id="param-hrv" value="45.2" step="0.1">
        </div>
        <div class="parameter-cell">
            <label>Procalcitonin (ng/mL)</label>
            <input type="number" id="param-pct" value="0.45" step="0.01">
        </div>
        <div class="parameter-cell">
            <label>PaO2 / FiO2 Ratio</label>
            <input type="number" id="param-pf" value="210" step="1">
        </div>
    </div>

    <button id="execution-trigger" class="execution-trigger">Compute Diagnostic State</button>

    <div class="output-monitor" id="monitor-terminal">
        <div class="status-frame status-IDLE" id="status-display">[State]: System Idle</div>
        <div id="rationale-display">Awaiting telemetry load instruction execution...</div>
    </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
