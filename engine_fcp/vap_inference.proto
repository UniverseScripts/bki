syntax = "proto3";

package vap;

service VAPPredictor {
  rpc Predict (InferenceRequest) returns (InferenceResponse) {}
}

message InferenceRequest {
  float peep = 1;
  float pip = 2;
  float fio2 = 3;
  float hrv = 4;
  float procalcitonin = 5;
  float p_f_ratio = 6;
}

message InferenceResponse {
  float risk_probability = 1;
}
